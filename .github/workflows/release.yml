name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 1.2.3)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.15.0 --activate

      - name: Restore pnpm store cache
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Restore Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}

      - name: Configure Android SDK
        run: |
          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-/usr/local/lib/android/sdk}}"
          echo "ANDROID_HOME=$SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$SDK_ROOT" >> $GITHUB_ENV
          echo "sdk.dir=$SDK_ROOT" > android/local.properties

      - name: Install Android SDK components
        run: |
          SDKMANAGER=$(ls -1 $ANDROID_HOME/cmdline-tools/*/bin/sdkmanager $ANDROID_HOME/tools/bin/sdkmanager 2>/dev/null | head -1)
          if [ -z "$SDKMANAGER" ]; then
            echo "sdkmanager not found under $ANDROID_HOME"
            $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --list 2>/dev/null && SDKMANAGER=$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager || true
          fi
          if [ -n "$SDKMANAGER" ]; then
            yes | $SDKMANAGER "platforms;android-36" "build-tools;36.0.0" 2>&1 | tail -5
          else
            echo "WARNING: sdkmanager not found â€” assuming SDK components are pre-installed."
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup signing keys
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          mkdir -p android/signing
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/signing/islet-release.keystore
            echo "storeFile=signing/islet-release.keystore" > android/signing/keystore.properties
            echo "storePassword=$KEYSTORE_PASSWORD" >> android/signing/keystore.properties
            echo "keyAlias=$KEY_ALIAS" >> android/signing/keystore.properties
            echo "keyPassword=$KEY_PASSWORD" >> android/signing/keystore.properties
            echo "Signing keys configured."
          else
            echo "No KEYSTORE_BASE64 secret set â€” APK will be unsigned."
          fi

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build release APK
        run: pnpm release:android -- --version $VERSION

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: islet-notes-${{ steps.version.outputs.version }}
          path: android/app/build/outputs/apk/release/app-release*.apk
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push'
        with:
          name: v${{ steps.version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          files: android/app/build/outputs/apk/release/app-release*.apk
          generate_release_notes: true
